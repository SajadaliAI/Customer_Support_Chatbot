<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthCare Support</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Header -->
<header>
    <div class="container">
        <h1>HealthCare Support</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#services">Services</a>
            <a href="#contact">Contact</a>
        </nav>
    </div>
</header>

<!-- Hero Section -->
<section id="home" class="hero">
    <div class="container">
        <h2>Welcome to HealthCare Customer Support</h2>
        <p>Ask any question related to our healthcare services.</p>
    </div>
</section>

<!-- Services Section -->
<section id="services">
    <div class="container">
        <h2>Our Services</h2>
        <div class="cards">
            <div class="card">Appointment Booking</div>
            <div class="card">Patient Support</div>
            <div class="card">Health Consultation</div>
        </div>
    </div>
</section>

<!-- Footer -->
<footer>
    <div class="container">
        <p>&copy; 2026 HealthCare Support. All rights reserved.</p>
    </div>
</footer>

<!-- Chatbot Icon & Window -->
<div id="chatbot-icon">💬</div>
<div id="chat-window">
    <div id="chat-header">Customer Support</div>
    <div id="chat-messages"></div>
    <div id="chat-input">
        <input type="text" id="user-message" placeholder="Type your message...">
        <button id="send-button">Send</button>
    </div>
</div>

<script>
const icon = document.getElementById('chatbot-icon');
const windowDiv = document.getElementById('chat-window');
const messages = document.getElementById('chat-messages');
const input = document.getElementById('user-message');
const button = document.getElementById('send-button');

icon.addEventListener('click', () => {
    windowDiv.style.display = windowDiv.style.display === 'none' ? 'flex' : 'none';
});

button.addEventListener('click', sendMessage);
input.addEventListener('keypress', (e) => { if(e.key==='Enter') sendMessage(); });

async function sendMessage() {
    const text = input.value.trim();
    if(!text) return;

    const userBubble = document.createElement('div');
    userBubble.className = 'bubble user';
    userBubble.textContent = text;
    messages.appendChild(userBubble);

    input.value = '';
    messages.scrollTop = messages.scrollHeight;

    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({message: text})
        });
        const data = await response.json();
        const botBubble = document.createElement('div');
        botBubble.className = 'bubble bot';
        botBubble.textContent = data.response;
        messages.appendChild(botBubble);
        messages.scrollTop = messages.scrollHeight;
    } catch(err) { console.error(err); }
}
</script>

</body>
</html>
